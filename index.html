<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>퍼드(FERD) 파일 관리 시스템</title>
    <style>
        /* 1. 폰트 설정 */
        @font-face {
            font-family: 'NexonGothic';
            src: url('NexonLv2Gothic_2.ttf') format('truetype');
        }
        
        body { 
            font-family: 'NexonGothic', sans-serif; 
            padding: 20px; 
            line-height: 1.6; 
            color: #333; 
        }

        h2 { border-bottom: 2px solid #888; padding-bottom: 10px; }

        /* 2. 입력창 디자인: 가로 12% 수준 */
        .config-section { 
            background: #f9f9f9; 
            padding: 15px; 
            border: 1px solid #ddd; 
            border-radius: 5px; 
            margin-bottom: 20px; 
        }
        
        input[type="text"], input[type="password"] { 
            width: 12%; 
            padding: 5px; 
            margin-right: 5px; 
            border: 1px solid #ccc; 
            font-family: 'NexonGothic';
            font-size: 13px;
        }

        /* 3. 버튼 디자인 통일: 회색 배경, 여백 최소화 */
        button { 
            padding: 5px 10px; 
            background: #888; 
            color: white; 
            border: none; 
            cursor: pointer; 
            border-radius: 3px; 
            font-family: 'NexonGothic';
            font-size: 13px;
            margin-right: 2px;
        }
        
        button:hover { background: #666; }

        /* 4. 테이블 디자인 (가운데 정렬 및 너비 조정) */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; table-layout: fixed; }
        
        /* 첫 번째 행(헤더) 가로 가운데 정렬 */
        th { 
            background-color: #f2f2f2; 
            border: 1px solid #ddd; 
            padding: 8px; 
            text-align: center; 
        }
        
        td { border: 1px solid #ddd; padding: 8px; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        /* 파일명 행 너비 조정 (전체의 약 14% = 1/7) */
        .col-name { width: 14%; }
        .col-num { width: 50px; text-align: center; }
        .col-time { width: 150px; text-align: center; }
        .col-action { width: 220px; text-align: center; }
        
        tr:hover { background-color: #f9f9f9; }

        #mainContent { margin-top: 20px; }
        .search-area { margin-bottom: 15px; display: flex; align-items: center; }
        #searchInput { width: 20% !important; padding: 7px !important; margin-right: 10px; }
    </style>
</head>
<body>

    <h2>퍼드(FERD) 파일 관리 시스템</h2>

    <div class="config-section">
        <input type="password" id="token" placeholder="토큰">
        <input type="text" id="repo" placeholder="아이디/저장소">
        <button onclick="saveConfig()">저장</button>
    </div>

    <div id="mainContent" style="display: none;">
        <div class="search-area">
            <input type="text" id="searchInput" onkeyup="searchFiles()" placeholder="파일 이름 검색...">
            <button onclick="getFiles()">목록 새로고침</button>
            <button onclick="document.getElementById('fileInput').click()">파일 업로드</button>
            <input type="file" id="fileInput" style="display: none;" onchange="uploadFile()">
        </div>

        <table id="fileTable">
            <thead>
                <tr>
                    <th class="col-num">순번</th>
                    <th class="col-name">파일명</th>
                    <th class="col-time">업로드 시간</th>
                    <th class="col-action">작업</th>
                </tr>
            </thead>
            <tbody id="listContainer"></tbody>
        </table>
    </div>

    <script>
        const ADMIN_PASSWORD = "jkd7102!!";

        window.onload = function() {
            const pwd = prompt("비밀번호를 입력하세요:");
            if (pwd === ADMIN_PASSWORD) {
                document.getElementById('mainContent').style.display = 'block';
                const savedToken = localStorage.getItem('github_token');
                const savedRepo = localStorage.getItem('github_repo');
                if (savedToken) document.getElementById('token').value = savedToken;
                if (savedRepo) document.getElementById('repo').value = savedRepo;
                if (savedToken && savedRepo) getFiles();
            } else {
                alert("비밀번호가 틀렸습니다.");
                document.body.innerHTML = "<div style='padding:50px; text-align:center;'><h3>접근 권한이 없습니다.</h3></div>";
            }
        };

        function saveConfig() {
            localStorage.setItem('github_token', document.getElementById('token').value);
            localStorage.setItem('github_repo', document.getElementById('repo').value);
            alert("정보가 저장되었습니다.");
            getFiles();
        }

        async function uploadFile() {
            const token = document.getElementById('token').value;
            const repo = document.getElementById('repo').value;
            const fileInput = document.getElementById('fileInput');
            if (!fileInput.files[0] || !token || !repo) return;

            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.onload = async function() {
                const content = reader.result.split(',')[1];
                const url = `https://api.github.com/repos/${repo}/contents/${encodeURIComponent(file.name)}`;
                const response = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Upload ${file.name}`, content: content })
                });
                if (response.ok) { alert("업로드 성공!"); getFiles(); }
                else { alert("업로드 실패."); }
            };
            reader.readAsDataURL(file);
            fileInput.value = "";
        }

        async function getFiles() {
            const token = document.getElementById('token').value;
            const repo = document.getElementById('repo').value;
            const listContainer = document.getElementById('listContainer');
            if (!token || !repo) return;

            listContainer.innerHTML = "<tr><td colspan='4' style='text-align:center;'>목록을 불러오는 중...</td></tr>";

            try {
                const url = `https://api.github.com/repos/${repo}/contents/`;
                const response = await fetch(url, { headers: { 'Authorization': `token ${token}` } });

                if (response.ok) {
                    const data = await response.json();
                    listContainer.innerHTML = "";
                    let count = 1;

                    const filesOnly = data.filter(item => item.type === 'file' && item.name !== 'index.html' && item.name !== 'NexonLv2Gothic_2.ttf');

                    for (const file of filesOnly) {
                        const commitUrl = `https://api.github.com/repos/${repo}/commits?path=${encodeURIComponent(file.name)}&per_page=1`;
                        const commitRes = await fetch(commitUrl, { headers: { 'Authorization': `token ${token}` } });
                        const commitData = await commitRes.json();
                        let displayDate = (commitData && commitData[0]) ? commitData[0].commit.committer.date.replace('T', ' ').substring(0, 16) : "-";

                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td style="text-align:center;">${count++}</td>
                            <td title="${file.name}">${file.name}</td>
                            <td style="text-align:center;">${displayDate}</td>
                            <td style="text-align:center;">
                                <button onclick="copyUrl('${file.download_url}')">URL복사</button>
                                <button onclick="window.open('${file.download_url}')">다운로드</button>
                                <button onclick="deleteFile('${file.name}', '${file.sha}')" style="background:#888;">삭제</button>
                            </td>
                        `;
                        listContainer.appendChild(tr);
                    }
                }
            } catch (e) { listContainer.innerHTML = "<tr><td colspan='4'>목록 로딩 실패</td></tr>"; }
        }

        async function deleteFile(name, sha) {
            if (!confirm(`'${name}'을 삭제할까요?`)) return;
            const token = document.getElementById('token').value;
            const repo = document.getElementById('repo').value;
            const url = `https://api.github.com/repos/${repo}/contents/${encodeURIComponent(name)}`;

            const response = await fetch(url, {
                method: 'DELETE',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `Delete ${name}`, sha: sha })
            });

            if (response.ok) { alert("삭제 완료!"); getFiles(); }
            else { alert("삭제 실패. 이미 삭제되었거나 권한이 없습니다."); getFiles(); }
        }

        function copyUrl(url) {
            navigator.clipboard.writeText(url).then(() => alert("URL 복사 완료!"));
        }

        function searchFiles() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const rows = document.querySelectorAll('#listContainer tr');
            rows.forEach(row => {
                const fileName = row.cells[1].innerText.toLowerCase();
                row.style.display = fileName.includes(input) ? "" : "none";
            });
        }
    </script>
</body>
</html>
