<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- 스마트폰 반응형 웹을 위한 뷰포트 설정 추가 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>퍼드(FERD) 파일 관리 시스템</title>
    <style>
        /* 1. 폰트 설정 */
        @font-face {
            font-family: 'NexonGothic';
            src: url('NexonLv2Gothic_2.ttf') format('truetype');
        }
        
        body { 
            font-family: 'NexonGothic', sans-serif; 
            padding: 20px; 
            line-height: 1.6; 
            color: #333;
            /* 웹 화면 우측 무한 늘어남 방지 및 중앙 정렬 */
            max-width: 800px; 
            margin: 0 auto; 
            box-sizing: border-box;
        }

        h2 { border-bottom: 2px solid #888; padding-bottom: 10px; font-size: 20px; }

        /* 2. 입력창 디자인: 가로 12% 수준 (최소 너비 보장) */
        .config-section { 
            background: #f9f9f9; 
            padding: 15px; 
            border: 1px solid #ddd; 
            border-radius: 5px; 
            margin-bottom: 20px; 
        }
        
        input[type="text"], input[type="password"] { 
            width: 12%; 
            min-width: 100px;
            padding: 5px; 
            margin-right: 5px; 
            border: 1px solid #ccc; 
            font-family: 'NexonGothic';
            font-size: 13px;
            box-sizing: border-box;
        }

        /* 3. 버튼 디자인 통일: 회색 배경, 여백 최소화 */
        button { 
            padding: 5px 10px; 
            background: #888; 
            color: white; 
            border: none; 
            cursor: pointer; 
            border-radius: 3px; 
            font-family: 'NexonGothic';
            font-size: 13px;
            margin-right: 2px;
            white-space: nowrap;
        }
        
        button:hover { background: #666; }

        /* 4. 테이블 디자인 및 가로 사이즈 50% 축소 반영 */
        .table-responsive { width: 100%; overflow-x: auto; } /* 스마트폰 가로 스크롤 허용 */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; table-layout: fixed; min-width: 450px; }
        
        th { 
            background-color: #f2f2f2; 
            border: 1px solid #ddd; 
            padding: 6px; 
            text-align: center; 
        }
        
        td { border: 1px solid #ddd; padding: 6px; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        /* 지정된 열 사이즈 50% 축소 반영 */
        .col-name { width: auto; } 
        .col-num { width: 25px; text-align: center; font-size: 12px; } /* 50px -> 25px */
        .col-time { width: 75px; text-align: center; font-size: 12px; } /* 150px -> 75px */
        .col-action { width: 110px; text-align: center; } /* 220px -> 110px */
        
        /* 110px 안에 버튼 3개가 들어가도록 테이블 내 버튼 크기 최소화 */
        td button {
            padding: 2px 4px;
            font-size: 11px;
            margin-right: 1px;
            letter-spacing: -0.5px;
        }

        tr:hover { background-color: #f9f9f9; }

        #mainContent { margin-top: 20px; }
        .search-area { margin-bottom: 15px; display: flex; align-items: center; flex-wrap: wrap; gap: 5px; }
        #searchInput { width: 20% !important; min-width: 120px; padding: 7px !important; margin-right: 5px; flex-grow: 1; }

        /* 모바일 기기(스마트폰) 최적화 설정 */
        @media screen and (max-width: 600px) {
            body { padding: 10px; }
            input[type="text"], input[type="password"] { width: 45%; margin-bottom: 5px; }
            .search-area button { flex-grow: 1; padding: 8px; }
            .col-time { font-size: 10px; }
        }
    </style>
</head>
<body>

    <h2>퍼드(FERD) 파일 관리 시스템</h2>

    <div class="config-section">
        <input type="password" id="token" placeholder="토큰">
        <input type="text" id="repo" placeholder="아이디/저장소">
        <button onclick="saveConfig()">저장</button>
    </div>

    <div id="mainContent" style="display: none;">
        <div class="search-area">
            <input type="text" id="searchInput" onkeyup="searchFiles()" placeholder="파일 이름 검색...">
            <button onclick="getFiles()">목록 새로고침</button>
            <button onclick="document.getElementById('fileInput').click()">파일 업로드</button>
            <input type="file" id="fileInput" style="display: none;" onchange="uploadFile()">
        </div>

        <!-- 모바일 가로 스크롤을 위한 래퍼 추가 -->
        <div class="table-responsive">
            <table id="fileTable">
                <thead>
                    <tr>
                        <th class="col-num">순번</th>
                        <th class="col-name">파일명</th>
                        <th class="col-time">업로드 시간</th>
                        <th class="col-action">작업</th>
                    </tr>
                </thead>
                <tbody id="listContainer"></tbody>
            </table>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "jkd7102!!";

        window.onload = function() {
            const pwd = prompt("비밀번호를 입력하세요:");
            if (pwd === ADMIN_PASSWORD) {
                document.getElementById('mainContent').style.display = 'block';
                const savedToken = localStorage.getItem('github_token');
                const savedRepo = localStorage.getItem('github_repo');
                if (savedToken) document.getElementById('token').value = savedToken;
                if (savedRepo) document.getElementById('repo').value = savedRepo;
                if (savedToken && savedRepo) getFiles();
            } else {
                alert("비밀번호가 틀렸습니다.");
                document.body.innerHTML = "<div style='padding:50px; text-align:center;'><h3>접근 권한이 없습니다.</h3></div>";
            }
        };

        function saveConfig() {
            localStorage.setItem('github_token', document.getElementById('token').value);
            localStorage.setItem('github_repo', document.getElementById('repo').value);
            alert("정보가 저장되었습니다.");
            getFiles();
        }

        async function uploadFile() {
            const token = document.getElementById('token').value;
            const repo = document.getElementById('repo').value;
            const fileInput = document.getElementById('fileInput');
            if (!fileInput.files[0] || !token || !repo) return;

            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.onload = async function() {
                const content = reader.result.split(',')[1];
                const url = `https://api.github.com/repos/${repo}/contents/${encodeURIComponent(file.name)}`;
                const response = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Upload ${file.name}`, content: content })
                });
                if (response.ok) { 
                    alert("업로드 성공!"); 
                    getFiles(); // 업로드 직후 새로고침
                } else { 
                    alert("업로드 실패."); 
                }
            };
            reader.readAsDataURL(file);
            fileInput.value = "";
        }

        async function getFiles() {
            const token = document.getElementById('token').value;
            const repo = document.getElementById('repo').value;
            const listContainer = document.getElementById('listContainer');
            if (!token || !repo) return;

            listContainer.innerHTML = "<tr><td colspan='4' style='text-align:center;'>목록을 불러오는 중...</td></tr>";

            try {
                // 캐시 방지 옵션 추가: 무조건 최신 목록을 가져오도록 강제
                const url = `https://api.github.com/repos/${repo}/contents/`;
                const response = await fetch(url, { 
                    headers: { 'Authorization': `token ${token}` },
                    cache: 'no-store' 
                });

                if (response.ok) {
                    const data = await response.json();
                    listContainer.innerHTML = "";
                    let count = 1;

                    const filesOnly = data.filter(item => item.type === 'file' && item.name !== 'index.html' && item.name !== 'NexonLv2Gothic_2.ttf');

                    for (const file of filesOnly) {
                        const commitUrl = `https://api.github.com/repos/${repo}/commits?path=${encodeURIComponent(file.name)}&per_page=1`;
                        // 업로드 시간도 캐시 없이 정확하게 가져오도록 옵션 추가
                        const commitRes = await fetch(commitUrl, { 
                            headers: { 'Authorization': `token ${token}` },
                            cache: 'no-store' 
                        });
                        const commitData = await commitRes.json();
                        let displayDate = (commitData && commitData[0]) ? commitData[0].commit.committer.date.replace('T', ' ').substring(0, 16) : "-";

                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td style="text-align:center;">${count++}</td>
                            <td title="${file.name}">${file.name}</td>
                            <td style="text-align:center;">${displayDate}</td>
                            <td style="text-align:center;">
                                <button onclick="copyUrl('${file.download_url}')">URL복사</button>
                                <button onclick="window.open('${file.download_url}')">다운로드</button>
                                <!-- 삭제 버튼 빨간색 배경(#cc0000)으로 복구 -->
                                <button onclick="deleteFile('${file.name}', '${file.sha}')" style="background:#cc0000;">삭제</button>
                            </td>
                        `;
                        listContainer.appendChild(tr);
                    }
                }
            } catch (e) { listContainer.innerHTML = "<tr><td colspan='4'>목록 로딩 실패</td></tr>"; }
        }

        async function deleteFile(name, sha) {
            if (!confirm(`'${name}'을 삭제할까요?`)) return;
            const token = document.getElementById('token').value;
            const repo = document.getElementById('repo').value;
            const url = `https://api.github.com/repos/${repo}/contents/${encodeURIComponent(name)}`;

            const response = await fetch(url, {
                method: 'DELETE',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `Delete ${name}`, sha: sha })
            });

            if (response.ok) { 
                alert("삭제 완료!"); 
                getFiles(); 
            } else { 
                alert("삭제 실패. 이미 삭제되었거나 권한이 없습니다."); 
                getFiles(); 
            }
        }

        function copyUrl(url) {
            navigator.clipboard.writeText(url).then(() => alert("URL 복사 완료!"));
        }

        function searchFiles() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const rows = document.querySelectorAll('#listContainer tr');
            rows.forEach(row => {
                const fileName = row.cells[1].innerText.toLowerCase();
                row.style.display = fileName.includes(input) ? "" : "none";
            });
        }
    </script>
</body>
</html>
